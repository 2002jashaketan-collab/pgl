<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Love Night</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at bottom,#020111 0%,#000 100%);
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite alternate, move 60s linear infinite;
}

@keyframes move{
  from{transform:translateY(0)}
  to{transform:translateY(-100vh)}
}

@keyframes twinkle{
  from{opacity:.2}
  to{opacity:1}
}

.heart{
  font-size:110px;
  display:none;
  opacity:0;
  cursor:pointer;
  animation:beat 1.2s infinite;
  transition:opacity 1s;
}

.heart.show{display:block;opacity:1}

@keyframes beat{
  0%{transform:scale(1)}
  20%{transform:scale(1.4)}
  40%{transform:scale(1)}
  60%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

#name{
  font-size:28px;
  color:#ffb3c6;
  margin-bottom:10px;
}

.box{text-align:center}

input{
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

.letter{
  position:absolute;
  background:rgba(0,0,0,.85);
  padding:20px;
  border-radius:15px;
  display:none;
  text-align:center;
}

.particle{
  position:absolute;
  font-size:20px;
  animation:explode 1s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y)) scale(0);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <div id="typing"></div>
  <input id="password" placeholder="Type here...">
  <br>
  <button onclick="checkPassword()">Unlock ❤️</button>
  <div id="msg"></div>
</div>

<div id="name"></div>
<div class="heart" id="heart" onclick="openSite(event)">❤️</div>

<div class="letter" id="letter">
💌 My Love,<br><br>
Every heartbeat is for you ❤️<br>
I Love You Forever 💖
</div>

<audio id="b1" src="https://www.soundjay.com/human/heartbeat-01a.mp3"></audio>
<audio id="b2" src="https://www.soundjay.com/human/heartbeat-01a.mp3"></audio>

<script>

// get elements safely
const typingEl = document.getElementById('typing');
const nameEl = document.getElementById('name');
const passwordEl = document.getElementById('password');
const loginBox = document.getElementById('loginBox');
const heart = document.getElementById('heart');
const msg = document.getElementById('msg');
const letter = document.getElementById('letter');
const b1 = document.getElementById('b1');
const b2 = document.getElementById('b2');

// stars
for(let i=0;i<200;i++){
 let s=document.createElement('div');
 s.className='star';
 s.style.top=Math.random()*innerHeight+'px';
 s.style.left=Math.random()*innerWidth+'px';
 document.body.appendChild(s);
}

// typing intro
let txt="💌 Enter the secret love message...";
let i=0;
(function typeIntro(){
  if(i<txt.length){
    typingEl.innerHTML += txt[i++];
    setTimeout(typeIntro,40);
  }
})();

// name typing
function typeName(){
 let name="Preeti ❤️";
 let j=0;
 nameEl.innerHTML="";

 function type(){
   if(j<name.length){
     nameEl.innerHTML += name[j++];
     setTimeout(type,100);
   }
 }
 type();
}

// password
function checkPassword(){
 let val = passwordEl.value.trim().toLowerCase();

 if(val==='i love you'){
   loginBox.style.display='none';
   heart.classList.add('show');
   typeName();
 }else{
   msg.innerText='Wrong ❤️';
 }
}

// vibration
function vib(){ if(navigator.vibrate) navigator.vibrate([120,60,120]); }

// heartbeat
let started=false;
function beat(){
 if(started) return;
 started=true;

 setInterval(()=>{
  b1.currentTime=0; b1.play().catch(()=>{}); vib();
  setTimeout(()=>{
    b2.currentTime=0; b2.play().catch(()=>{}); vib();
  },250);
 },1200);
}

// voice
function speak(){
 if('speechSynthesis' in window){
  let m=new SpeechSynthesisUtterance("I love you");
  speechSynthesis.speak(m);
 }
}

// explosion
function explode(x,y){
 for(let i=0;i<20;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.innerHTML='❤️';
  p.style.left=x+'px';
  p.style.top=y+'px';

  let a=Math.random()*2*Math.PI;
  let d=Math.random()*150;

  p.style.setProperty('--x',Math.cos(a)*d+'px');
  p.style.setProperty('--y',Math.sin(a)*d+'px');

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
 }
}

// open site
function openSite(e){
 let r = heart.getBoundingClientRect();
 let x = r.left + r.width/2;
 let y = r.top + r.height/2;

 explode(x,y);
 beat();
 speak();
 letter.style.display='block';

 setTimeout(()=>{
  window.location.href="https://2002jashaketan-collab.github.io/Ys/";
 },3000);
}

</script>

</body>
</html>
